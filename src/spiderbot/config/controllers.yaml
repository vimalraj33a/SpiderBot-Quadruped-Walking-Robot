controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0

joint_trajectory_controller:
  ros__parameters:
    joints:
      - fr1_joint
      - fr2_joint
      - fl1_joint
      - fl2_joint
      - rr1_joint
      - rr2_joint
      - rl1_joint
      - rl2_joint
    command_interfaces: [position]
    state_interfaces:   [position, velocity]
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: true
    allow_integration_in_goal_trajectories: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
    gains:
      fr1_joint: {p: 100.0, i: 5.0, d: 10.0}
      fr2_joint: {p: 100.0, i: 5.0, d: 10.0}
      fl1_joint: {p: 100.0, i: 5.0, d: 10.0}
      fl2_joint: {p: 100.0, i: 5.0, d: 10.0}
      rr1_joint: {p: 100.0, i: 5.0, d: 10.0}
      rr2_joint: {p: 100.0, i: 5.0, d: 10.0}
      rl1_joint: {p: 100.0, i: 5.0, d: 10.0}
      rl2_joint: {p: 100.0, i: 5.0, d: 10.0}
